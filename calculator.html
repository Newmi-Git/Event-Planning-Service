<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calculator</title>
    <link rel="stylesheet" href="/css/calculator.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <header>
      <div class="navbar-container">
        <nav class="navbar">
          <ul>
            <li class="nav-left"><a href="./gallery.html">Gallery</a></li>
            <li class="nav-left"><a href="./services.html">Events</a></li>
            <li class="nav-left">
              <a href="./calculator.html">Budget Tracker</a>
            </li>

            <li class="logo-item">
              <a href="./index.html">
                <img src="images/AffaireDeCoeur_transparent.png" alt="Logo" />
              </a>
            </li>

            <li class="nav-right"><a href="./review.html">Reviews</a></li>
            <li class="nav-right"><a href="./about.html">About Us</a></li>
            <li class="nav-right"><a href="./contact.html">Contact</a></li>

            <li class="dropdown-item nav-right">
              <button
                class="account-btn"
                aria-haspopup="true"
                aria-expanded="false"
              >
                Account <span class="arrow">▼</span>
              </button>
              <div class="dropdown-menu">
                <a href="./login.html" class="dropdown-link">Login</a>
                <a href="./sign-up.html" class="dropdown-link signup-highlight"
                  >Sign Up</a
                >
              </div>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <div id="container">
      <div id="calculator">
        <input id="display" placeholder="0" readonly />
        <div id="btns">
          <button class="special" onclick="appendtodisplay('+')">+</button>
          <button class="calculator-buttons" onclick="appendtodisplay('7')">7</button>
          <button class="calculator-buttons" onclick="appendtodisplay('8')">8</button>
          <button class="calculator-buttons" onclick="appendtodisplay('9')">9</button>
          <button class="special" onclick="appendtodisplay('-')">-</button>
          <button class="calculator-buttons" onclick="appendtodisplay('4')">4</button>
          <button class="calculator-buttons" onclick="appendtodisplay('5')">5</button>
          <button class="calculator-buttons" onclick="appendtodisplay('6')">6</button>
          <button class="special" onclick="appendtodisplay('*')">×</button>
          <button class="calculator-buttons" onclick="appendtodisplay('1')">1</button>
          <button class="calculator-buttons" onclick="appendtodisplay('2')">2</button>
          <button class="calculator-buttons" onclick="appendtodisplay('3')">3</button>
          <button class="special calculator-buttons" onclick="appendtodisplay('/')">÷</button>
          <button class="special calculator-buttons" onclick="Cleardisplay('AC')">AC</button>
          <button class="special calculator-buttons" onclick="Calculate('=')">=</button>
          <button class="calculator-buttons" onclick="appendtodisplay('0')">0</button>
        </div>

        <input
          type="number"
          id="budgetinput"
          placeholder="Enter budget"
        /><br /><br />
        <div id="budget">
          <button class="budgetbutton calculator-buttons"  onclick="setbudget()">Set Budget</button>
          <button class="subtractbutton calculator-buttons"  onclick="subtractprices()">
            Subtract all prices from budget
          </button>
        </div>
      </div>
      <br />

      <div class="add-events">
        <div id="cardsContainer"></div>

        <h3>Total: <span id="totalprice">R0</span></h3>

        <p id="budgetstatus"></p>
        <a href="services.html">
          <button class="addevent">Add more Events</button>
        </a>
      </div>

      <div id="model-container">
        <dialog id="showalert" class="show-alert">
          <div id="customalert-content">
            <h2>Alert</h2>
            <p>Please enter a valid budget amount</p>
            <button id="confirm">OK</button>
          </div>
        </dialog>
      </div>
      <div id="model-container">
        <dialog id="showalert2" class="show-alert">
          <div id="customalert-content">
            <h2>Alert</h2>
            <p>No events in your plan.</p>
            <button id="confirm2">OK</button>
          </div>
        </dialog>
      </div>
    </div>

    <button
      id="darkModeBtn"
      class="darkmode-btn"
      aria-label="Toggle Dark Mode"
      style="
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 9999;
        padding: 10px;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid black;
      "
    >
      <img src="images/icons8-dark-mode-50.png" alt="Dark mode icon" />
    </button>

    <button
      id="darkModeBtn"
      class="darkmode-btn"
      aria-label="Toggle Dark Mode"
      style="
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 9999;
        padding: 10px;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid black;
      "
    >
      <img src="images/icons8-dark-mode-50.png" alt="Dark mode icon" />
    </button>

    <script src="/js/calculator.js"></script>
    <script src="./js/script.js"></script>
  </body>
</html>
